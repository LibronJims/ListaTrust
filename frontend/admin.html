<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ListaTrust - Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <img src="assets/logo.png" alt="ListaTrust" class="nav-logo">
            <span>Admin Panel</span>
        </div>
        <div class="nav-right">
            <span id="userName"></span>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Admin Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('users')">Users</button>
            <button class="tab-btn" onclick="showTab('stores')">Stores</button>
            <button class="tab-btn" onclick="showTab('logs')">Audit Logs</button>
        </div>

        <!-- Users Tab -->
        <div id="usersTab" class="tab-content active">
            <h3>Users</h3>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Verified</th>
                        <th>Active</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersList"></tbody>
            </table>
        </div>

        <!-- Stores Tab -->
        <div id="storesTab" class="tab-content">
            <h3>Pending Stores</h3>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Store Name</th>
                        <th>Owner</th>
                        <th>Contact</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="storesList"></tbody>
            </table>
        </div>

        <!-- Logs Tab -->
        <div id="logsTab" class="tab-content">
            <h3>Audit Logs</h3>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>User</th>
                        <th>Action</th>
                        <th>IP</th>
                    </tr>
                </thead>
                <tbody id="logsList"></tbody>
            </table>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            event.target.classList.add('active');
        }

        // Load users
        async function loadUsers() {
            const res = await fetch('http://127.0.0.1:3000/api/admin/users', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const users = await res.json();

            document.getElementById('usersList').innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.email}</td>
                    <td>${u.role}</td>
                    <td>${u.is_verified ? '✅' : '❌'}</td>
                    <td>${u.is_active ? '✅' : '❌'}</td>
                    <td>
                        <button onclick="toggleUser(${u.id})" class="btn-small">
                            ${u.is_active ? 'Deactivate' : 'Activate'}
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Load pending stores
        async function loadStores() {
            const res = await fetch('http://127.0.0.1:3000/api/admin/stores/pending', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const stores = await res.json();

            document.getElementById('storesList').innerHTML = stores.map(s => `
                <tr>
                    <td>${s.store_name}</td>
                    <td>${s.username} (${s.email})</td>
                    <td>${s.contact_number || 'N/A'}</td>
                    <td>
                        <button onclick="approveStore(${s.id})" class="btn-small btn-success">Approve</button>
                    </td>
                </tr>
            `).join('');
        }

        // Load audit logs
        async function loadLogs() {
            const res = await fetch('http://127.0.0.1:3000/api/admin/audit-logs', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const logs = await res.json();

            document.getElementById('logsList').innerHTML = logs.map(l => `
                <tr>
                    <td>${new Date(l.created_at).toLocaleString()}</td>
                    <td>${l.username || 'System'}</td>
                    <td>${l.action}</td>
                    <td>${l.ip_address}</td>
                </tr>
            `).join('');
        }

        // Approve store
        async function approveStore(storeId) {
            const res = await fetch(`http://127.0.0.1:3000/api/admin/stores/${storeId}/approve`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.ok) {
                alert('Store approved!');
                loadStores();
                loadLogs();
            }
        }

        // Toggle user status
        async function toggleUser(userId) {
            const res = await fetch(`http://127.0.0.1:3000/api/admin/users/${userId}/toggle-status`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.ok) {
                alert('User status updated');
                loadUsers();
                loadLogs();
            }
        }

        // Logout
        function logout() {
            fetch('http://127.0.0.1:3000/api/auth/logout', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            }).finally(() => {
                localStorage.clear();
                window.location.href = 'login.html';
            });
        }

        // Initial load
        loadUsers();
        loadStores();
        loadLogs();
    </script>
</body>
</html>
